<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <!-- Origin geri gelince otomatik kurtulsun: sayfa 15 sn'de bir kendini yeniler -->
  <meta http-equiv="refresh" content="15" />
  <title>Buca Yıldız — Kısa Bir Bakımdayız</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
      background: radial-gradient(120% 120% at 50% 0%, #181547 0%, #0A0927 62%);
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 460px; width: 100%; }
    .emblem { margin-bottom: 24px; animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: .85; } }
    .brand { font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: #DDBA4E; font-weight: 700; }
    h1 { font-size: clamp(26px, 7vw, 34px); font-weight: 800; margin: 12px 0 0; letter-spacing: .01em; }
    p { color: #B3B7D5; font-size: 15.5px; line-height: 1.65; margin: 14px auto 0; max-width: 400px; }
    .dots { display: inline-flex; gap: 7px; margin-top: 26px; }
    .dots span {
      width: 9px; height: 9px; border-radius: 50%;
      background: #C9A227; opacity: .35; animation: blink 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%, 100% { opacity: .3; } 50% { opacity: 1; } }
    .foot { margin-top: 34px; font-size: 12px; letter-spacing: .06em; color: #5250AF; }
    @media (prefers-reduced-motion: reduce) {
      .emblem, .dots span { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="emblem" width="82" height="82" viewBox="0 0 72 72" fill="none" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#0A0927" stroke="#C9A227" stroke-width="1.5" />
      <path d="M36 15.5l5.4 12.9 14 1.1-10.7 9.2 3.3 13.6-12-7.3-12 7.3 3.3-13.6L14.6 29.5l14-1.1z" fill="#DDBA4E" />
    </svg>
    <div class="brand">Buca Yıldız</div>
    <h1>Kısa Bir Bakımdayız</h1>
    <p>
      Sitemiz kısa bir güncelleme için geçici olarak bakımda. Bu sayfa birkaç
      saniye içinde otomatik olarak yenilenecek — birazdan buradayız.
    </p>
    <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="foot">Buca Yıldız Futbol Akademisi</div>
  </div>
</body>
</html>
