<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Buca Yıldız — Çok Fazla Deneme</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      min-height: 100vh; display: grid; place-items: center; padding: 40px 20px;
      background: radial-gradient(120% 120% at 50% 0%, #181547 0%, #0A0927 62%);
      color: #fff; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 460px; width: 100%; }
    .emblem { margin-bottom: 22px; }
    .brand { font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: #DDBA4E; font-weight: 700; }
    h1 { font-size: clamp(25px, 6.5vw, 32px); font-weight: 800; margin: 12px 0 0; letter-spacing: .01em; }
    p { color: #B3B7D5; font-size: 15.5px; line-height: 1.65; margin: 14px auto 0; max-width: 400px; }
    a.btn {
      display: inline-block; margin-top: 26px; padding: 12px 24px; border-radius: 8px;
      background: linear-gradient(180deg, #E9CE79, #C9A227); color: #0A0927;
      font-weight: 700; font-size: 14px; letter-spacing: .04em; text-transform: uppercase; text-decoration: none;
    }
    .foot { margin-top: 30px; font-size: 12px; letter-spacing: .06em; color: #5250AF; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="emblem" width="76" height="76" viewBox="0 0 72 72" fill="none" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#0A0927" stroke="#C9A227" stroke-width="1.5" />
      <path d="M36 15.5l5.4 12.9 14 1.1-10.7 9.2 3.3 13.6-12-7.3-12 7.3 3.3-13.6L14.6 29.5l14-1.1z" fill="#DDBA4E" />
    </svg>
    <div class="brand">Buca Yıldız</div>
    <h1>Çok Fazla Deneme</h1>
    <p>
      Güvenliğiniz için giriş denemeleri kısa süreliğine sınırlandı. Lütfen
      birkaç dakika bekleyip tekrar deneyin.
    </p>
    <a class="btn" href="/">Ana Sayfaya Dön</a>
    <div class="foot">Buca Yıldız Futbol Akademisi</div>
  </div>
</body>
</html>
