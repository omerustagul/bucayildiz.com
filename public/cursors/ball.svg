<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bSphere" cx="0.34" cy="0.26" r="1.0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f6f7f9"/>
      <stop offset="0.8" stop-color="#e2e5ea"/>
      <stop offset="1" stop-color="#bfc4cd"/>
    </radialGradient>
    <radialGradient id="bShade" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.72" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#3a4250" stop-opacity="0.35"/>
    </radialGradient>
    <linearGradient id="bPent" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#333945"/>
      <stop offset="0.5" stop-color="#1e222a"/>
      <stop offset="1" stop-color="#12151b"/>
    </linearGradient>
    <clipPath id="bClip"><circle cx="16" cy="15.6" r="13.1"/></clipPath>
  </defs>

  <!-- tüm kompozisyon merkez etrafında küçültülür (imleç boyutu) -->
  <g transform="translate(16 16) scale(0.62) translate(-16 -16)">
  <!-- zemin gölgesi -->
  <ellipse cx="16" cy="29.6" rx="8.6" ry="1.9" fill="#000000" opacity="0.16"/>

  <!-- küre -->
  <circle cx="16" cy="15.6" r="13.1" fill="url(#bSphere)"/>

  <g clip-path="url(#bClip)">
    <!-- merkez beşgen (perspektifte hafif yukarıda) -->
    <path d="M14.8 17.6 L10.24 14.28 L11.98 8.92 L17.62 8.92 L19.37 14.28 Z" fill="url(#bPent)"/>
    <!-- çevre paneller: daire kenarından taşarak kırpılır -->
    <path d="M0 -5 L4.76 -1.55 L2.94 4.05 L-2.94 4.05 L-4.76 -1.55 Z" transform="translate(14.8 24.6)" fill="url(#bPent)"/>
    <path d="M0 -5 L4.76 -1.55 L2.94 4.05 L-2.94 4.05 L-4.76 -1.55 Z" transform="translate(3.58 16.45) rotate(72)" fill="url(#bPent)"/>
    <path d="M0 -5 L4.76 -1.55 L2.94 4.05 L-2.94 4.05 L-4.76 -1.55 Z" transform="translate(7.86 3.25) rotate(144)" fill="url(#bPent)"/>
    <path d="M0 -5 L4.76 -1.55 L2.94 4.05 L-2.94 4.05 L-4.76 -1.55 Z" transform="translate(21.74 3.25) rotate(216)" fill="url(#bPent)"/>
    <path d="M0 -5 L4.76 -1.55 L2.94 4.05 L-2.94 4.05 L-4.76 -1.55 Z" transform="translate(26.02 16.45) rotate(288)" fill="url(#bPent)"/>
    <!-- dikişler: merkez beşgenden panellere -->
    <g stroke="#3a4048" stroke-width="1" stroke-linecap="round" opacity="0.75">
      <line x1="14.8" y1="17.6" x2="14.8" y2="19.6"/>
      <line x1="10.24" y1="14.28" x2="8.34" y2="14.91"/>
      <line x1="11.98" y1="8.92" x2="10.8" y2="7.3"/>
      <line x1="17.62" y1="8.92" x2="18.8" y2="7.3"/>
      <line x1="19.37" y1="14.28" x2="21.27" y2="14.91"/>
    </g>
    <!-- alt-sağ küresel gölgelenme -->
    <circle cx="16" cy="15.6" r="13.1" fill="url(#bShade)"/>
  </g>

  <!-- parlama -->
  <ellipse cx="10.6" cy="7.6" rx="4.6" ry="2.9" fill="#ffffff" opacity="0.65" transform="rotate(-24 10.6 7.6)"/>
  <circle cx="8.4" cy="6.4" r="1" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
