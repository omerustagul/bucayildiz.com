<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="wSteel" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#F2F5FA"/>
      <stop offset="0.45" stop-color="#B9C2CF"/>
      <stop offset="0.8" stop-color="#7C8595"/>
      <stop offset="1" stop-color="#59606d"/>
    </linearGradient>
    <radialGradient id="wCham" cx="0.35" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#E9EDF3"/>
      <stop offset="0.6" stop-color="#AEB7C4"/>
      <stop offset="1" stop-color="#6A7280"/>
    </radialGradient>
  </defs>

  <!-- tüm kompozisyon merkez etrafında küçültülür (imleç boyutu) -->
  <g transform="translate(16 16) scale(0.66) translate(-16 -16)">
  <!-- zemin gölgesi -->
  <ellipse cx="15.5" cy="29.6" rx="9" ry="1.8" fill="#000000" opacity="0.15"/>

  <!-- halka -->
  <circle cx="25.8" cy="7.6" r="3.1" fill="none" stroke="url(#wSteel)" stroke-width="1.9"/>
  <!-- bağlantı -->
  <path d="M23.6 9.6 L21.4 12.1" stroke="#8A93A1" stroke-width="2.2" stroke-linecap="round"/>

  <!-- gövde: ağızlık + hazne tek siluet -->
  <path d="M3.8 12.2 H18 A2.6 2.6 0 0 1 20.6 14.8 V15.2 A8 8 0 1 1 8.6 22.4 L4 16.6 A2.6 2.6 0 0 1 3.8 12.2 Z"
        fill="url(#wSteel)" stroke="#4C525D" stroke-width="0.8"/>
  <!-- hazne küresi -->
  <circle cx="16.8" cy="20.2" r="7" fill="url(#wCham)"/>
  <!-- hava yarığı -->
  <rect x="8.2" y="13.6" width="6.4" height="2.6" rx="1.3" fill="#2E333C"/>
  <!-- hazne ağzı (ses deliği) -->
  <path d="M12.6 18.4 A5.4 5.4 0 0 0 14.4 25.4 L16.8 20.2 Z" fill="#2E333C" opacity="0.9"/>
  <!-- parlamalar -->
  <path d="M6 13.4 H15" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity="0.75"/>
  <ellipse cx="14.4" cy="17.2" rx="2.6" ry="1.4" fill="#FFFFFF" opacity="0.5" transform="rotate(-28 14.4 17.2)"/>
  </g>
</svg>
