<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Buca Yıldız — kale filesi dokusu: köşeden köşeye SÜREKLİ çapraz ipler (elmas örgü),
       komşu tile'larla C1 sürekli bağlanır → kopuk değil gerçek file. Hafif dalga + ip
       altı gölge (derinlik) + kesişim düğümleri. Çok düşük opaklık. 40px sorunsuz döşenir. -->
  <g opacity="0.085" stroke-linecap="round">
    <!-- gölge (koyu, hafif aşağıda → kabarık ip etkisi) -->
    <g transform="translate(0,1.2)" fill="none" stroke="#03102b" stroke-width="2.3" opacity="0.6">
      <path d="M0,0 Q13.5,6.5 20,20 Q26.5,33.5 40,40"/>
      <path d="M0,40 Q13.5,33.5 20,20 Q26.5,6.5 40,0"/>
    </g>
    <!-- file ipleri (beyaz, hafif dalgalı) -->
    <g fill="none" stroke="#ffffff" stroke-width="1.3">
      <path d="M0,0 Q13.5,6.5 20,20 Q26.5,33.5 40,40"/>
      <path d="M0,40 Q13.5,33.5 20,20 Q26.5,6.5 40,0"/>
    </g>
    <!-- kesişim düğümleri -->
    <g fill="#ffffff">
      <circle cx="0" cy="0" r="1.1"/>
      <circle cx="40" cy="0" r="1.1"/>
      <circle cx="0" cy="40" r="1.1"/>
      <circle cx="40" cy="40" r="1.1"/>
      <circle cx="20" cy="20" r="1.1"/>
    </g>
  </g>
</svg>
