<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="Small radii keep the sharp, corporate line" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:22px;font-family:var(--font-body)}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:74px;height:60px;background:var(--navy-50);border:1.5px solid var(--navy-700)}
  .t{font-size:11px;color:var(--ink-500);text-align:center}
  .t b{display:block;color:var(--ink-900);font-size:12px}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="t"><b>2px</b>radius-xs</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="t"><b>4px</b>radius-sm</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="t"><b>6px</b>radius-md</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="t"><b>10px</b>radius-lg</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="t"><b>14px</b>radius-xl</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:96px"></div><div class="t"><b>999px</b>pill</div></div>
</div>
</body></html>
