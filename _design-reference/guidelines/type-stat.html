<!-- @dsCard group="Type" viewport="700x170" name="Stat numerals — Barlow Semi Condensed" subtitle="Tabular figures for scores, fixtures & stats" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--navy-800);padding:24px;font-family:var(--font-body)}
  .wrap{display:flex;align-items:center;gap:40px}
  .score{font-family:var(--font-stat);font-weight:700;font-variant-numeric:tabular-nums;color:#fff;font-size:64px;line-height:1;letter-spacing:.01em}
  .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-400);font-weight:600;margin-bottom:8px}
  .stat{font-family:var(--font-stat);font-weight:700;font-size:40px;color:var(--gold-400);font-variant-numeric:tabular-nums}
  .cap{font-size:12px;color:var(--navy-200);margin-top:2px}
  .col{display:flex;flex-direction:column}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="lbl">Maç Skoru</div><div class="score">3 – 1</div></div>
  <div class="col"><div class="stat">128</div><div class="cap">Lisanslı sporcu</div></div>
  <div class="col"><div class="stat">14</div><div class="cap">Yıllık deneyim</div></div>
  <div class="col"><div class="stat">19:00</div><div class="cap">İlk düdük</div></div>
</div>
</body></html>
