<!-- @dsCard group="Colors" viewport="700x150" name="Gold scale" subtitle="Precious accent — use sparingly, primary is gold-500" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:20px;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--ink-200)}
  .sw{height:84px;display:flex;align-items:flex-end;padding:8px}
  .sw span{font-size:10.5px;font-weight:600}
  .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--ink-500)}
  .meta b{color:var(--ink-800)}
</style></head><body>
<div class="row" id="r"></div>
<div class="meta"><span><b>--gold-500</b> · primary gold accent</span><span>#C9A227</span></div>
<script>
const steps=[['800','#6F540F','#fff'],['700','#8A6A18','#fff'],['600','#A8841F','#fff'],['500','#C9A227','#1B1300'],['400','#DDBA4E','#1B1300'],['300','#E9CE79','#1B1300'],['200','#F2E0A8','#1B1300'],['100','#F8EFD2','#1B1300']];
document.getElementById('r').innerHTML=steps.map(([k,c,t])=>`<div class="sw" style="background:${c};color:${t}"><span>${k}</span></div>`).join('');
</script>
</body></html>
