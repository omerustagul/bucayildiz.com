<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid · --space-1 … --space-24" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:22px;font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--navy-700);width:26px;border-radius:var(--radius-xs)}
  .t{font-size:11px;color:var(--ink-500);text-align:center}
  .t b{display:block;color:var(--ink-900);font-size:12px}
</style></head><body>
<div class="row" id="r"></div>
<script>
const s=[['1',4],['2',8],['3',12],['4',16],['6',24],['8',32],['10',40],['12',48],['16',64],['20',80]];
document.getElementById('r').innerHTML=s.map(([k,v])=>`<div class="col"><div class="bar" style="height:${v}px"></div><div class="t"><b>${v}</b>space-${k}</div></div>`).join('');
</script>
</body></html>
