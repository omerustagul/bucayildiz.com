<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:26px;font-family:var(--font-body)}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-700)}
  .kicker::before{content:"";width:22px;height:2px;background:var(--gold-500)}
  h2{font-family:var(--font-heading);font-weight:700;font-size:42px;text-transform:uppercase;color:var(--ink-900);letter-spacing:-.01em;line-height:1;margin:12px 0 0}
  .rule{width:56px;height:4px;background:var(--grad-gold);border-radius:999px;margin-top:14px}
</style></head><body>
<span class="kicker">Akademi</span>
<h2>Yaş Grupları</h2>
<div class="rule"></div>
</body></html>
