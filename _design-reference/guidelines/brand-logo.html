<!-- @dsCard group="Brand" viewport="700x300" name="Logo / amblem" subtitle="Buca Yıldız crest — primary mark" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body)}
  .wrap{display:grid;grid-template-columns:1fr 1fr;min-height:300px}
  .pane{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
  .navy{background:var(--grad-navy)}
  .light{background:var(--ink-50)}
  img{width:150px;height:150px;object-fit:contain;filter:drop-shadow(0 10px 24px rgba(0,0,0,.35))}
  .cap{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  .navy .cap{color:var(--gold-400)}
  .light .cap{color:var(--gold-700)}
</style></head><body>
<div class="wrap">
  <div class="pane navy"><img src="../assets/logo-emblem.png" alt="Buca Yıldız"><span class="cap">Lacivert zemin</span></div>
  <div class="pane light"><img src="../assets/logo-emblem.png" alt="Buca Yıldız" style="filter:drop-shadow(0 8px 18px rgba(14,33,72,.22))"><span class="cap">Açık zemin</span></div>
</div>
</body></html>
