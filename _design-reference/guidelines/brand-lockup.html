<!-- @dsCard group="Brand" viewport="700x160" name="Lockup & footer overhang" subtitle="Horizontal lockup + crest overhanging the footer edge" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:#fff}
  .lockup{display:flex;align-items:center;gap:14px;padding:22px 24px 12px}
  .lockup img{width:54px;height:54px;object-fit:contain}
  .nm{font-family:var(--font-heading);font-weight:700;text-transform:uppercase;line-height:.95}
  .nm .a{font-size:26px;color:var(--navy-700);letter-spacing:.02em}
  .nm .b{font-size:11px;letter-spacing:.28em;color:var(--gold-700);font-weight:600}
  .foot{position:relative;height:64px;background:var(--grad-navy);margin-top:18px}
  .foot img{position:absolute;left:50%;top:0;width:64px;height:64px;object-fit:contain;transform:translate(-50%,-50%);filter:drop-shadow(0 8px 18px rgba(0,0,0,.4))}
</style></head><body>
<div class="lockup">
  <img src="../assets/logo-emblem.png" alt="">
  <div class="nm"><div class="a">Buca Yıldız</div><div class="b">Futbol Akademisi</div></div>
</div>
<div class="foot"><img src="../assets/logo-emblem.png" alt=""></div>
</body></html>
