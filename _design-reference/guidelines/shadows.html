<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadows" subtitle="Navy-tinted shadows, sm → xl" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink-50);padding:28px;font-family:var(--font-body)}
  .row{display:flex;gap:26px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:96px;height:64px;background:#fff;border-radius:var(--radius-md)}
  .t{font-size:11.5px;color:var(--ink-500)}
  .t b{color:var(--ink-900)}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t"><b>sm</b></div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t"><b>md</b></div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t"><b>lg</b></div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="t"><b>xl</b></div></div>
  <div class="col"><div class="box" style="box-shadow:var(--ring-focus)"></div><div class="t"><b>focus ring</b> (gold)</div></div>
</div>
</body></html>
