<!-- @dsCard group="Colors" viewport="700x140" name="Status colors" subtitle="Restrained corporate success / warning / danger" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:20px;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .tile{display:flex;align-items:center;gap:12px;border:1px solid var(--ink-200);border-radius:var(--radius-md);padding:12px 14px}
  .dot{width:34px;height:34px;border-radius:var(--radius-sm);flex:none}
  .t b{display:block;font-size:13px;color:var(--ink-900)}
  .t span{font-size:11.5px;color:var(--ink-500)}
</style></head><body>
<div class="grid">
  <div class="tile"><div class="dot" style="background:var(--color-success)"></div><div class="t"><b>Success</b><span>--color-success · #1E7D4F</span></div></div>
  <div class="tile"><div class="dot" style="background:var(--color-warning)"></div><div class="t"><b>Warning</b><span>--color-warning · #B7841A</span></div></div>
  <div class="tile"><div class="dot" style="background:var(--color-danger)"></div><div class="t"><b>Danger / Canlı</b><span>--color-danger · #B23A3A</span></div></div>
</div>
</body></html>
