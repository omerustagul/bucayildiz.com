<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Display → eyebrow, sizes & roles" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:22px;font-family:var(--font-body)}
  table{width:100%;border-collapse:collapse}
  td{padding:10px 8px;border-bottom:1px solid var(--ink-100);vertical-align:baseline}
  .tok{font-size:12px;color:var(--ink-400);width:150px;white-space:nowrap}
  .px{font-size:12px;color:var(--ink-400);width:64px;text-align:right}
  .h{font-family:var(--font-heading);font-weight:700;text-transform:uppercase;color:var(--ink-900);line-height:1}
  .b{font-family:var(--font-body);color:var(--ink-800)}
</style></head><body>
<table>
  <tr><td class="tok">--text-display</td><td><span class="h" style="font-size:46px">Display</span></td><td class="px">84↓</td></tr>
  <tr><td class="tok">--text-h1</td><td><span class="h" style="font-size:36px">Başlık H1</span></td><td class="px">60↓</td></tr>
  <tr><td class="tok">--text-h2</td><td><span class="h" style="font-size:28px;color:var(--navy-700)">Başlık H2</span></td><td class="px">44↓</td></tr>
  <tr><td class="tok">--text-h3</td><td><span class="b" style="font-family:var(--font-heading);font-weight:600;font-size:24px">Başlık H3</span></td><td class="px">24</td></tr>
  <tr><td class="tok">--text-base</td><td><span class="b" style="font-size:16px">Gövde metni 16px</span></td><td class="px">16</td></tr>
  <tr><td class="tok">--text-eyebrow</td><td><span style="font-family:var(--font-body);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-700)">Eyebrow / Kicker</span></td><td class="px">13</td></tr>
</table>
</body></html>
