<!-- @dsCard group="Colors" viewport="700x170" name="Semantic roles" subtitle="Primary, accent, surfaces & text mapped to tokens" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:20px;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .tile{border:1px solid var(--ink-200);border-radius:var(--radius-md);overflow:hidden}
  .cap{height:64px}
  .nm{padding:8px 10px;font-size:11.5px;color:var(--ink-600)}
  .nm b{display:block;color:var(--ink-900);font-size:12.5px;letter-spacing:.02em}
</style></head><body>
<div class="grid">
  <div class="tile"><div class="cap" style="background:var(--color-primary)"></div><div class="nm"><b>--color-primary</b>navy-700</div></div>
  <div class="tile"><div class="cap" style="background:var(--color-primary-strong)"></div><div class="nm"><b>--color-primary-strong</b>navy-800</div></div>
  <div class="tile"><div class="cap" style="background:var(--color-accent)"></div><div class="nm"><b>--color-accent</b>gold-500</div></div>
  <div class="tile"><div class="cap" style="background:var(--color-accent-soft)"></div><div class="nm"><b>--color-accent-soft</b>gold-100</div></div>
  <div class="tile"><div class="cap" style="background:var(--surface-page);border-bottom:1px solid var(--ink-200)"></div><div class="nm"><b>--surface-page</b>#FFFFFF</div></div>
  <div class="tile"><div class="cap" style="background:var(--surface-subtle)"></div><div class="nm"><b>--surface-subtle</b>ink-50</div></div>
  <div class="tile"><div class="cap" style="background:var(--surface-navy)"></div><div class="nm"><b>--surface-navy</b>navy-800</div></div>
  <div class="tile"><div class="cap" style="background:var(--border-subtle)"></div><div class="nm"><b>--border-subtle</b>ink-200</div></div>
</div>
</body></html>
