<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ink scale" subtitle="Cool grays for text, borders & subtle fills" -->
<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#fff;padding:20px;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(10,1fr);gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--ink-200)}
  .sw{height:84px;display:flex;align-items:flex-end;padding:8px}
  .sw span{font-size:10.5px;font-weight:600}
  .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--ink-500)}
  .meta b{color:var(--ink-800)}
</style></head><body>
<div class="row" id="r"></div>
<div class="meta"><span><b>--ink-900</b> headings · <b>--ink-700</b> body · <b>--ink-200</b> borders</span><span>cool, leans navy</span></div>
<script>
const steps=[['900','#11151F','#fff'],['800','#1B212E','#fff'],['700','#2C3340','#fff'],['600','#434B5A','#fff'],['500','#5A6273','#fff'],['400','#828B9C','#fff'],['300','#B7BECB','#11151F'],['200','#DDE1E8','#11151F'],['100','#EFF1F5','#11151F'],['50','#F7F8FB','#11151F']];
document.getElementById('r').innerHTML=steps.map(([k,c,t])=>`<div class="sw" style="background:${c};color:${t}"><span>${k}</span></div>`).join('');
</script>
</body></html>
