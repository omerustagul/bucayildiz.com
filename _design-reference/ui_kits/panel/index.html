<!-- @dsCard group="Sporcu Paneli" viewport="1320x900" name="Sporcu Paneli — Dashboard" subtitle="Sidebar + sporcu bilgileri, program takvimi (hafta/ay), performans matrisi" -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sporcu Paneli — Buca Yıldız</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-subtle); }
  @media (max-width: 900px){
    main { padding: 22px 16px 40px !important; }
    main [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 760px){
    #root > div > aside { display: none !important; }
    .pl-athlete { flex-direction: column !important; }
    .pl-athlete-photo { width: 100% !important; height: 200px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="PanelShell.jsx"></script>
<script type="text/babel" src="AthleteCard.jsx"></script>
<script type="text/babel" src="TrainingCalendar.jsx"></script>
<script type="text/babel" src="PerformanceMatrix.jsx"></script>
<script type="text/babel">
const { PanelShell, AthleteCard, TrainingCalendar, PerformanceMatrix } = window;
function App() {
  React.useEffect(() => {
    const t = setInterval(() => window.lucide && window.lucide.createIcons(), 400);
    return () => clearInterval(t);
  }, []);
  return (
    <PanelShell title="Sporcu Paneli" subtitle="Hoş geldin, Arda — bu haftanın programı ve performans özetin aşağıda.">
      <AthleteCard />
      <TrainingCalendar />
      <PerformanceMatrix />
    </PanelShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>
