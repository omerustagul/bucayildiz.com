<!-- @startingPoint section="Website" subtitle="Başvuru / application form screen" viewport="1280x900" -->
<!-- @dsCard group="Website" viewport="1280x900" name="Başvuru Formu — Application" subtitle="Two-column application form with navy intro panel" -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Başvuru Formu — Buca Yıldız</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-subtle); min-height: 100vh; }
  .topbar { background: var(--navy-800); }
  .grid2 { display: grid; grid-template-columns: 1.1fr 1.3fr; }
  @media (max-width: 880px){ .grid2{ grid-template-columns: 1fr; } }
  .frm { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 560px){
    .frm { grid-template-columns: 1fr; }
    .grid2 > div { padding-left: 22px !important; padding-right: 22px !important; padding-top: 34px !important; padding-bottom: 34px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="SiteFooter.jsx"></script>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Badge } = window.BucaYLdZTasarMSistemi_45a34f;
const I = (n, sz=17) => <i data-lucide={n} style={{width:sz,height:sz}}></i>;

const BENEFITS = [
  ['shield-check','UEFA lisanslı antrenörler eşliğinde profesyonel gelişim'],
  ['calendar-check','Ücretsiz tanışma antrenmanı ve seviye tespiti'],
  ['users','Yaş grubuna özel bireysel gelişim takibi'],
  ['trophy','Bölgesel ve gelişim liglerinde aktif rekabet'],
];

function IntroPanel() {
  return (
    <div style={{background:'var(--grad-navy-deep)',color:'#fff',padding:'48px 44px',position:'relative',overflow:'hidden'}}>
      <span style={{position:'absolute',right:-50,bottom:-40,fontSize:300,color:'rgba(201,162,39,.05)',lineHeight:1}}>★</span>
      <div style={{position:'relative'}}>
        <Badge tone="gold">Sezon 2026/27 Kayıtları</Badge>
        <h1 style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:'clamp(34px,4vw,52px)',lineHeight:.98,textTransform:'uppercase',margin:'18px 0 14px'}}>Yıldız Adaylarını<br/>Sahaya Bekliyoruz</h1>
        <p style={{fontSize:15.5,lineHeight:1.65,color:'var(--navy-100)',maxWidth:380,margin:'0 0 30px'}}>Başvuru formunu doldurun, antrenörlerimiz en kısa sürede sizinle iletişime geçerek ücretsiz deneme antrenmanı için randevu oluştursun.</p>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {BENEFITS.map(([ic,tx])=>(
            <div key={tx} style={{display:'flex',gap:13,alignItems:'flex-start'}}>
              <span style={{flex:'none',width:34,height:34,borderRadius:'var(--radius-sm)',background:'rgba(201,162,39,.14)',color:'var(--gold-400)',display:'grid',placeItems:'center'}}>{I(ic,17)}</span>
              <span style={{fontSize:14.5,lineHeight:1.5,color:'#fff',paddingTop:6}}>{tx}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function FormPanel() {
  const [sent, setSent] = React.useState(false);
  if (sent) {
    return (
      <div style={{padding:'56px 48px',display:'grid',placeItems:'center',textAlign:'center',minHeight:520,alignContent:'center'}}>
        <span style={{width:72,height:72,borderRadius:'50%',background:'var(--green-100)',color:'var(--green-600)',display:'grid',placeItems:'center',marginBottom:18}}>{I('check',34)}</span>
        <h2 style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:30,textTransform:'uppercase',color:'var(--text-strong)',margin:'0 0 10px'}}>Başvurunuz Alındı</h2>
        <p style={{fontSize:15,color:'var(--text-muted)',maxWidth:360,margin:'0 0 24px'}}>Teşekkürler! Antrenörlerimiz 48 saat içinde sizinle iletişime geçerek deneme antrenmanı randevunuzu oluşturacak.</p>
        <Button variant="secondary" onClick={()=>setSent(false)}>Yeni Başvuru</Button>
      </div>
    );
  }
  return (
    <div style={{padding:'44px 48px'}}>
      <h2 style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:28,textTransform:'uppercase',color:'var(--text-strong)',margin:'0 0 4px'}}>Başvuru Formu</h2>
      <p style={{fontSize:14.5,color:'var(--text-muted)',margin:'0 0 26px'}}>* işaretli alanlar zorunludur.</p>
      <form onSubmit={(e)=>{e.preventDefault();setSent(true);}}>
        <div style={{fontFamily:'var(--font-heading)',fontWeight:600,fontSize:15,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--gold-700)',margin:'0 0 14px'}}>Sporcu Bilgileri</div>
        <div className="frm">
          <Input label="Ad Soyad" placeholder="Öğrencinin adı" required />
          <Input label="Doğum Tarihi" type="date" required />
          <Select label="Yaş Grubu" placeholder="Seçiniz" options={['U-15','U-16','U-17','U-18','A Takım']} required />
          <Input label="Mevki" placeholder="örn. Forvet" hint="İsteğe bağlı" />
        </div>
        <div style={{fontFamily:'var(--font-heading)',fontWeight:600,fontSize:15,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--gold-700)',margin:'26px 0 14px'}}>Veli İletişim</div>
        <div className="frm">
          <Input label="Veli Ad Soyad" placeholder="Veli adı" required />
          <Input label="Telefon" placeholder="05xx xxx xx xx" required />
          <Input label="E-posta" type="email" placeholder="ornek@eposta.com" containerStyle={{gridColumn:'1 / -1'}} />
        </div>
        <div style={{margin:'22px 0',display:'flex',flexDirection:'column',gap:12}}>
          <Checkbox label="KVKK aydınlatma metnini okudum ve kişisel verilerimin işlenmesini onaylıyorum." />
          <Checkbox label="Kulüpten haber, duyuru ve kampanyalardan haberdar olmak istiyorum." defaultChecked />
        </div>
        <Button type="submit" variant="accent" size="lg" fullWidth rightIcon={I('arrow-right',18)}>Başvuruyu Gönder</Button>
      </form>
    </div>
  );
}

function App(){
  React.useEffect(()=>{ const t=setInterval(()=>window.lucide&&window.lucide.createIcons(),400); return ()=>clearInterval(t); },[]);
  return (
    <React.Fragment>
      {window.SiteHeader && React.createElement(window.SiteHeader, { backHref: 'index.html', onLogin: () => { window.location.href = 'panel-giris.html'; }, onApply: () => { const g = document.querySelector('.grid2'); if (g) window.scrollTo({ top: g.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }); } })}
      <div style={{maxWidth:1160,margin:'40px auto',padding:'0 32px'}}>
        <div className="grid2" style={{background:'#fff',border:'1px solid var(--border-subtle)',borderRadius:'var(--radius-xl)',overflow:'hidden',boxShadow:'var(--shadow-lg)'}}>
          <IntroPanel/>
          <FormPanel/>
        </div>
      </div>
      {window.SiteFooter && React.createElement(window.SiteFooter)}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),80);
</script>
</body>
</html>
